name: Deploy to Prod

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    uses: ./.github/workflows/reusable-workflow.yaml
    with:
      env: prod
      aws_account_id: "715192338314"
      tag: ${{ github.ref_name }}
    secrets: inherit
