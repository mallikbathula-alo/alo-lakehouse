name: Deploy to Dev

on:
  workflow_dispatch:
  pull_request:
    types: [labeled]

permissions:
  id-token: write
  contents: read
  pull-requests: read

jobs:
  # Gate: only run when PR has "ready for deployment" label + an approved review
  check-label:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.label.name == 'ready for deployment' &&
       github.event.pull_request.base.ref == 'main')
    steps:
      - name: Check for approved review
        if: github.event_name != 'workflow_dispatch'
        uses: actions/github-script@v7
        with:
          script: |
            const reviews = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number
            });
            const approved = reviews.data.some(r => r.state === 'APPROVED');
            if (!approved) core.setFailed('PR must be approved before deploying to dev.');

  deploy:
    needs: check-label
    uses: ./.github/workflows/reusable-workflow.yaml
    with:
      env: dev
      aws_account_id: "206390103201"
    secrets: inherit
